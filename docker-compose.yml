networks:
  microservices-net:
    driver: bridge

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - microservices-net

  api-gateway:
    build:
      context: .
      args:
        APP_NAME: api-gateway
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - redis
    networks:
      - microservices-net

  user-service:
    build:
      context: .
      args:
        APP_NAME: user-service
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://root:root@mongodb:27017/users?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices-net

  auth-service:
    build:
      context: .
      args:
        APP_NAME: auth-service
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://root:root@mongodb:27017/auth?authSource=admin
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=74f4e738d86335c9728796de50e151b3e2ab217a9235452f0ae3b72934803093w
      - JWT_EXPIRES_IN=7d
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - microservices-net

  notification-service:
    build:
      context: .
      args:
        APP_NAME: notification-service
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://root:root@mongodb:27017/notifications?authSource=admin
      - KAFKA_BROKERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_FROM=${MAILGUN_FROM}
      - IDEMPOTENCY_TTL_SECONDS=86400
      - RETRY_MAX_ATTEMPTS=3
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    networks:
      - microservices-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    networks:
      - microservices-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 15
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.otp.send --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.wallet.credited --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.trade.executed --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.price.alert --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.cms.provisioned --partitions 3 --replication-factor 1
      echo 'All topics created'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - microservices-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - microservices-net

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices-net
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "root",
          "--password",
          "root",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
