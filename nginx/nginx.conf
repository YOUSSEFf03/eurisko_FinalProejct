worker_processes auto;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rid=$http_x_request_id rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  # ── Security ──────────────────────────────────────────────────────────────
  server_tokens off;
  client_max_body_size 10m;
  client_body_timeout 30s;
  client_header_timeout 30s;

  # ── Upstream: all traffic goes through api-gateway ────────────────────────
  upstream api_gateway {
    server api-gateway:3000;
    keepalive 32;
  }

  # ─────────────────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Pass real client IP to NestJS (read in LoggerMiddleware)
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header Host             $http_host;

    # Propagate or generate request ID for distributed tracing
    set $req_id $http_x_request_id;
    if ($req_id = '') {
      set $req_id $request_id;
    }
    proxy_set_header X-Request-Id $req_id;

    proxy_http_version 1.1;
    proxy_set_header Connection "";  # enable keepalive to upstream

    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Health check — no auth, direct to gateway ──────────────────────────
    location = /health {
      proxy_pass http://api_gateway;
    }

    # ── Auth routes ───────────────────────────────────────────────────────
    location /api/v1/auth/ {
      proxy_pass http://api_gateway;
    }

    # ── Wallet routes ─────────────────────────────────────────────────────
    location /api/v1/wallet/ {
      proxy_pass http://api_gateway;
    }

    # ── Stocks routes ─────────────────────────────────────────────────────
    location /api/v1/stocks/ {
      proxy_pass http://api_gateway;
    }

    # ── Orders routes ─────────────────────────────────────────────────────
    location /api/v1/orders/ {
      proxy_pass http://api_gateway;
    }

    # ── Portfolio routes ──────────────────────────────────────────────────
    location /api/v1/portfolio/ {
      proxy_pass http://api_gateway;
    }

    # ── Analytics routes (longer timeout for heavy aggregation) ───────────
    location /api/v1/analytics/ {
      proxy_pass         http://api_gateway;
      proxy_read_timeout 120s;
    }

    # ── CMS routes ────────────────────────────────────────────────────────
    location /api/v1/cms/ {
      proxy_pass http://api_gateway;
    }

    # ── Stripe webhook — raw body must be preserved ───────────────────────
    location /api/v1/wallet/deposit/webhook {
      proxy_pass         http://api_gateway;
      proxy_request_buffering off;
    }

    # ── Catch-all ─────────────────────────────────────────────────────────
    location / {
      proxy_pass http://api_gateway;
    }
  }
}